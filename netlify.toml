<script>
    // Nav scroll effect
    const navbar = document.getElementById('navbar');
    window.addEventListener('scroll', () => {
        navbar.classList.toggle('scrolled', window.scrollY > 50);
    }, { passive: true });

    // Hamburger / mobile menu
    const hamburger   = document.getElementById('hamburger');
    const mobileMenu  = document.getElementById('mobileMenu');
    const menuClose   = document.getElementById('menuClose');

    function openMobileMenu() {
        mobileMenu.style.display = 'flex';
        requestAnimationFrame(() => mobileMenu.classList.add('open'));
        hamburger.classList.add('open');
        document.body.style.overflow = 'hidden';
    }
    function closeMobileMenu() {
        mobileMenu.classList.remove('open');
        hamburger.classList.remove('open');
        document.body.style.overflow = '';
        setTimeout(() => { mobileMenu.style.display = ''; }, 300);
    }
    hamburger.addEventListener('click', openMobileMenu);
    menuClose.addEventListener('click', closeMobileMenu);

    // Scroll reveal
    const revealEls = document.querySelectorAll('.reveal');
    const io = new IntersectionObserver((entries) => {
        entries.forEach((entry, i) => {
            if (entry.isIntersecting) {
                entry.target.style.transitionDelay = (i % 4) * 0.08 + 's';
                entry.target.classList.add('in');
                io.unobserve(entry.target);
            }
        });
    }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
    revealEls.forEach(el => io.observe(el));

    // FAQ accordion
    function toggleFAQ(btn) {
        const item = btn.closest('.faq-item');
        const answer = item.querySelector('.faq-a');
        const isOpen = item.classList.contains('open');

        // Close all
        document.querySelectorAll('.faq-item.open').forEach(el => {
            el.classList.remove('open');
            el.querySelector('.faq-a').classList.remove('open');
        });

        // Open clicked (if it was closed)
        if (!isOpen) {
            item.classList.add('open');
            answer.classList.add('open');
        }
    }

    // Application form — AJAX submit to Netlify Forms (no page reload)
    function handleApplySubmit(e) {
        e.preventDefault();
        const form = document.getElementById('applyForm');
        const btn = document.getElementById('applySubmitBtn');
        const data = new FormData(form);

        btn.disabled = true;
        btn.textContent = 'Submitting...';

        fetch('/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams(data).toString()
        })
        .then(() => {
            form.style.display = 'none';
            document.getElementById('formStatus').classList.add('show');
        })
        .catch(() => {
            btn.disabled = false;
            btn.textContent = 'Submit Application';
            alert("Something went wrong submitting your application. Please try again, or email us directly at flowgroupwc@gmail.com.");
        });

        return false;
    }
</script>

</body>
