<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow Group WC — Car Rentals for Uber, Lyft & Everyday Drivers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --navy:     #1B3C6E;
            --blue:     #2178C4;
            --orange:   #F7941D;
            --orange-d: #D97B0A;
            --bg:       #FFFFFF;
            --surface:  #F2F6FC;
            --card:     #FFFFFF;
            --border:   #DDE4F0;
            --text:     #1B3C6E;
            --text-2:   #4A6080;
            --text-3:   #94A8C0;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; overflow-x: hidden; max-width: 100%; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; max-width: 100%; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--surface); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--blue); }

        /* ─── Animations ─── */
        @keyframes fadeUp   { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn   { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideR   { from { opacity: 0; transform: translateX(36px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes float    { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes pulseDot { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.85); } }
        @keyframes marquee  { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        .anim-fadeUp { animation: fadeUp 0.85s cubic-bezier(0.16,1,0.3,1) forwards; opacity: 0; }
        .anim-fadeIn { animation: fadeIn 1s   cubic-bezier(0.16,1,0.3,1) forwards; opacity: 0; }
        .anim-slideR { animation: slideR 0.9s cubic-bezier(0.16,1,0.3,1) forwards; opacity: 0; }

        .d1 { animation-delay: 0.1s; }
        .d2 { animation-delay: 0.25s; }
        .d3 { animation-delay: 0.4s; }
        .d4 { animation-delay: 0.55s; }
        .d5 { animation-delay: 0.7s; }

        /* Scroll reveal */
        .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.75s cubic-bezier(0.16,1,0.3,1), transform 0.75s cubic-bezier(0.16,1,0.3,1); }
        .reveal.in { opacity: 1; transform: translateY(0); }

        /* ─── Nav ─── */
        #navbar { background: rgba(255,255,255,0.0); backdrop-filter: blur(0px); transition: background 0.4s, backdrop-filter 0.4s, box-shadow 0.4s; }
        #navbar.scrolled { background: rgba(255,255,255,0.95); backdrop-filter: blur(18px); box-shadow: 0 1px 0 var(--border); }

        /* ─── Buttons ─── */
        .btn-orange {
            font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 0.82rem;
            letter-spacing: 0.06em; text-transform: uppercase; text-decoration: none;
            display: inline-block; padding: 0.85rem 1.85rem; border-radius: 6px; cursor: pointer;
            background: var(--orange); color: #fff; border: none;
            transition: background 0.25s, transform 0.3s cubic-bezier(0.16,1,0.3,1), box-shadow 0.3s;
        }
        .btn-orange:hover  { background: var(--orange-d); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(247,148,29,0.3); }
        .btn-orange:active { transform: scale(0.98) translateY(0); }

        .btn-navy {
            font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 0.82rem;
            letter-spacing: 0.06em; text-transform: uppercase; text-decoration: none;
            display: inline-block; padding: 0.85rem 1.85rem; border-radius: 6px; cursor: pointer;
            background: transparent; color: var(--navy); border: 2px solid var(--border);
            transition: border-color 0.25s, color 0.25s, transform 0.3s cubic-bezier(0.16,1,0.3,1);
        }
        .btn-navy:hover  { border-color: var(--navy); color: var(--navy); transform: translateY(-2px); }
        .btn-navy:active { transform: scale(0.98) translateY(0); }

        /* ─── Hero image ─── */
        .hero-img-wrap { position: relative; border-radius: 16px; overflow: hidden; box-shadow: 0 32px 80px rgba(27,60,110,0.18); }
        .hero-img-wrap img { display: block; width: 100%; height: 100%; object-fit: cover; transition: transform 0.7s cubic-bezier(0.16,1,0.3,1); }
        .hero-img-wrap:hover img { transform: scale(1.03); }

        /* ─── Pill badge ─── */
        .pill { display: inline-flex; align-items: center; gap: 0.5rem; background: rgba(33,120,196,0.08); border: 1px solid rgba(33,120,196,0.2); border-radius: 100px; padding: 0.35rem 1rem; }
        .dot-live { width: 7px; height: 7px; background: #2DAE68; border-radius: 50%; animation: pulseDot 2s ease-in-out infinite; flex-shrink: 0; }

        /* ─── Glass card ─── */
        .glass-card {
            background: rgba(255,255,255,0.9);
            border: 1px solid rgba(255,255,255,0.9);
            box-shadow: 0 8px 32px rgba(27,60,110,0.14), inset 0 1px 0 rgba(255,255,255,1);
            backdrop-filter: blur(14px);
            border-radius: 12px;
        }

        /* ─── Float ─── */
        .float-anim { animation: float 5s ease-in-out infinite; }

        /* ─── Marquee ─── */
        .marquee-track { display: flex; width: max-content; animation: marquee 28s linear infinite; }
        .marquee-track:hover { animation-play-state: paused; }

        /* ─── Who It's For cards ─── */
        .for-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
            padding: 2.5rem; transition: box-shadow 0.3s, border-color 0.3s, transform 0.3s cubic-bezier(0.16,1,0.3,1);
        }
        .for-card:hover { box-shadow: 0 16px 48px rgba(27,60,110,0.1); border-color: var(--blue); transform: translateY(-4px); }

        /* ─── Benefit rows ─── */
        .benefit-row {
            display: grid; grid-template-columns: 48px 1fr 1fr; align-items: start; gap: 1.5rem;
            padding: 2rem 0; border-top: 1px solid var(--border);
            transition: background 0.2s;
        }
        .benefit-row:hover { background: var(--surface); margin: 0 -1.5rem; padding-left: 1.5rem; padding-right: 1.5rem; border-radius: 8px; }

        /* ─── Step grid ─── */
        .step-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: center; }
        .step-num { font-family: 'Outfit', sans-serif; font-size: 6.5rem; font-weight: 900; line-height: 1; color: transparent; -webkit-text-stroke: 2px var(--border); user-select: none; }

        /* ─── FAQ rows ─── */
        .faq-item { border-top: 1px solid var(--border); }
        .faq-q { display: flex; justify-content: space-between; align-items: center; cursor: pointer; padding: 1.5rem 0; gap: 1rem; user-select: none; }
        .faq-q:hover h4 { color: var(--blue); }
        .faq-a { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.16,1,0.3,1); }
        .faq-a.open { max-height: 200px; }
        .faq-icon { width: 28px; height: 28px; border: 1.5px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: border-color 0.25s, transform 0.3s; font-size: 1.1rem; color: var(--text-3); }
        .faq-item.open .faq-icon { border-color: var(--blue); color: var(--blue); transform: rotate(45deg); }

        /* ─── Nav link ─── */
        .nav-link { color: var(--text-2); text-decoration: none; font-size: 0.88rem; font-weight: 500; letter-spacing: 0.03em; transition: color 0.2s; }
        .nav-link:hover { color: var(--navy); }

        /* ─── Footer link ─── */
        .foot-link { color: var(--text-2); text-decoration: none; font-size: 0.88rem; display: block; margin-bottom: 0.65rem; transition: color 0.2s; }
        .foot-link:hover { color: var(--blue); }

        /* ─── Check icon ─── */
        .check {
            width: 22px; height: 22px; border-radius: 50%; background: rgba(33,120,196,0.1);
            display: inline-flex; align-items: center; justify-content: center;
            flex-shrink: 0; margin-top: 1px;
        }
        .check svg { width: 12px; height: 12px; stroke: var(--blue); }

        /* ─── Uber/Lyft badges ─── */
        .platform-badge {
            display: inline-flex; align-items: center; gap: 0.5rem;
            border: 1.5px solid var(--border); border-radius: 8px; padding: 0.4rem 0.9rem;
            font-family: 'Outfit', sans-serif; font-size: 0.82rem; font-weight: 700;
            color: var(--text-2); letter-spacing: 0.04em;
            transition: border-color 0.2s, color 0.2s;
        }
        .platform-badge:hover { border-color: var(--blue); color: var(--navy); }

        /* ─── Form section ─── */
        .form-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; overflow: hidden; }
        .field-group { margin-bottom: 1.25rem; }
        .field-label { display: block; font-family: 'Outfit', sans-serif; font-size: 0.8rem; font-weight: 600; color: var(--navy); margin-bottom: 0.45rem; }
        .field-input, .field-select, .field-textarea {
            width: 100%; font-family: inherit; font-size: 0.92rem; color: var(--navy);
            background: #fff; border: 1.5px solid var(--border); border-radius: 8px;
            padding: 0.75rem 1rem; box-sizing: border-box; transition: border-color 0.2s, box-shadow 0.2s;
        }
        .field-input:focus, .field-select:focus, .field-textarea:focus {
            outline: none; border-color: var(--orange); box-shadow: 0 0 0 3px rgba(247,148,29,0.15);
        }
        .field-textarea { resize: vertical; min-height: 110px; }
        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
        .form-submit-btn { width: 100%; text-align: center; }
        .form-status { display: none; text-align: center; padding: 3rem 1rem; }
        .form-status.show { display: block; }
        .hp-field { position: absolute; left: -9999px; }
        @media (max-width: 560px) { .field-row { grid-template-columns: 1fr; } }

        /* ─── Hamburger ─── */
        .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; background: none; border: none; }
        .hamburger span { display: block; width: 24px; height: 2px; background: var(--navy); border-radius: 2px; transition: all 0.3s cubic-bezier(0.16,1,0.3,1); }
        .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
        .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        .mobile-menu {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.98); backdrop-filter: blur(20px);
            z-index: 90; flex-direction: column; align-items: center; justify-content: center;
            gap: 2.5rem; opacity: 0; transition: opacity 0.3s;
        }
        .mobile-menu.open { opacity: 1; }
        .mobile-menu a { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 800; color: var(--navy); text-decoration: none; letter-spacing: -0.02em; transition: color 0.2s; }
        .mobile-menu a:hover { color: var(--orange); }
        .mobile-menu .close-btn { position: absolute; top: 1.5rem; right: 1.5rem; background: none; border: none; cursor: pointer; font-size: 1.5rem; color: var(--text-3); padding: 0.5rem; }

        /* ─── Responsive ─── */
        @media (max-width: 900px) {
            /* Layout collapses */
            .hero-grid       { grid-template-columns: 1fr !important; padding: 5.5rem 1.25rem 3rem !important; }
            .hero-right      { display: block !important; margin-top: 2rem; }
            .step-grid       { grid-template-columns: 1fr !important; gap: 2rem !important; }
            .step-img        { order: -1 !important; }
            .for-grid        { grid-template-columns: 1fr !important; }
            .vehicle-grid    { grid-template-columns: 1fr !important; }
            .svc-header      { grid-template-columns: 1fr !important; }
            .svc-header > p  { display: none !important; }
            .footer-grid     { grid-template-columns: 1fr 1fr !important; }
            /* Benefit rows — stack vertically */
            .benefit-row     { grid-template-columns: 1fr !important; gap: 0.4rem !important; padding: 1.5rem 0 !important; }
            .benefit-row:hover { margin: 0 !important; padding-left: 0 !important; padding-right: 0 !important; }
            /* Nav */
            .nav-links       { display: none !important; }
            .hamburger       { display: flex !important; }
            .nav-logo        { height: 44px !important; }
            #navbar > div    { padding: 0.75rem 1.25rem !important; }
            /* Section padding */
            section          { padding: 4rem 1.25rem !important; }
            /* Component fixes */
            .form-wrap       { padding: 1rem !important; }
            .for-card        { padding: 1.5rem !important; }
            /* Comparison chart scrollable */
            .comparison-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 16px; }
            .comparison-scroll::after { content: '\2190  swipe to see more  \2192'; display: block; text-align: center; font-size: 0.68rem; color: var(--text-3); padding: 0.5rem 0 0; letter-spacing: 0.08em; font-family: 'Outfit', sans-serif; }
            .comparison-table { min-width: 430px; border-radius: 16px; }
            /* Step margins */
            .step-grid[style*="margin-bottom:6rem"] { margin-bottom: 3rem !important; }
            /* Marquee container */
            .marquee-wrap    { display: none; }
        }
        @media (max-width: 560px) {
            .footer-grid     { grid-template-columns: 1fr !important; }
            .step-num        { font-size: 3.5rem !important; }
            #contact         { padding: 4rem 1.25rem !important; }
            /* Hero stats wrap */
            .hero-stats      { gap: 1.25rem !important; flex-wrap: wrap !important; }
            /* Platform badges wrap */
            .platform-badges { flex-wrap: wrap !important; gap: 0.5rem !important; }
            /* Reduce step section margins */
            .reveal[style*="margin-bottom:6rem"] { margin-bottom: 2rem !important; }
        }
    </style>
</head>
<body>

<!-- ══════════════════════════════════════
     NAV
══════════════════════════════════════ -->
<nav id="navbar" style="position:fixed;top:0;left:0;right:0;z-index:100;">
    <div style="max-width:1340px;margin:0 auto;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;gap:1.5rem;">

        <a href="#" style="display:flex;align-items:center;flex-shrink:0;text-decoration:none;">
            <img src="logo.png" alt="Flow Group WC" class="nav-logo" style="height:72px;width:auto;object-fit:contain;">
        </a>

        <div class="nav-links" style="display:flex;align-items:center;gap:2.2rem;">
            <a href="#vehicles"   class="nav-link">Vehicles</a>
            <a href="#howitworks" class="nav-link">How It Works</a>
            <a href="#apply"      class="nav-link">Apply</a>
            <a href="#faq"        class="nav-link">FAQ</a>
        </div>

        <div style="display:flex;align-items:center;gap:0.75rem;">
            <a href="#apply" class="btn-orange" style="padding:0.65rem 1.35rem;flex-shrink:0;">Apply Now</a>
            <button class="hamburger" id="hamburger" aria-label="Open menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </div>
</nav>

<!-- Mobile menu overlay -->
<div class="mobile-menu" id="mobileMenu">
    <button class="close-btn" id="menuClose" aria-label="Close menu">&#10005;</button>
    <a href="#vehicles"   onclick="closeMobileMenu()">Vehicles</a>
    <a href="#howitworks" onclick="closeMobileMenu()">How It Works</a>
    <a href="#apply"      onclick="closeMobileMenu()">Apply</a>
    <a href="#faq"        onclick="closeMobileMenu()">FAQ</a>
    <a href="#apply" class="btn-orange" onclick="closeMobileMenu()" style="margin-top:0.5rem;">Apply Now — It's Free</a>
</div>


<!-- ══════════════════════════════════════
     HERO
══════════════════════════════════════ -->
<section style="min-height:100dvh;display:flex;align-items:center;padding-top:5rem;overflow:hidden;position:relative;">

    <!-- Subtle background gradient -->
    <div style="position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 65% 40%, rgba(33,120,196,0.06) 0%, transparent 70%);pointer-events:none;"></div>

    <div class="hero-grid" style="max-width:1340px;margin:0 auto;padding:3rem 2rem 4rem;display:grid;grid-template-columns:52% 48%;align-items:center;gap:3rem;width:100%;position:relative;z-index:1;">

        <!-- Left content -->
        <div>
            <div class="pill anim-fadeIn" style="margin-bottom:1.75rem;">
                <div class="dot-live"></div>
                <span style="font-family:'Outfit',sans-serif;font-size:0.72rem;letter-spacing:0.14em;color:var(--blue);text-transform:uppercase;font-weight:600;">Rideshare-Ready Vehicles</span>
            </div>

            <h1 class="anim-fadeUp d1" style="font-family:'Outfit',sans-serif;font-size:clamp(2.8rem,6.5vw,5.5rem);font-weight:900;line-height:1.03;letter-spacing:-0.03em;color:var(--navy);margin-bottom:0.15em;">
                Get on the road.<br>
                <span style="color:var(--orange);">Start earning.</span>
            </h1>

            <p class="anim-fadeUp d2" style="font-size:1.05rem;color:var(--text-2);line-height:1.75;max-width:480px;margin:1.5rem 0 2.25rem;font-weight:400;">
                Affordable weekly car rentals for Uber &amp; Lyft drivers — and anyone who needs a reliable vehicle without the long-term commitment.
            </p>

            <!-- Platform badges -->
            <div class="platform-badges anim-fadeUp d2" style="display:flex;gap:0.75rem;flex-wrap:wrap;margin-bottom:2rem;">
                <span class="platform-badge">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="var(--navy)"><circle cx="12" cy="12" r="10"/></svg>
                    Uber Eligible
                </span>
                <span class="platform-badge">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="var(--orange)"><circle cx="12" cy="12" r="10"/></svg>
                    Lyft Eligible
                </span>
                <span class="platform-badge">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="#2DAE68"><circle cx="12" cy="12" r="10"/></svg>
                    No Long Contract
                </span>
            </div>

            <div class="anim-fadeUp d3" style="display:flex;gap:0.9rem;flex-wrap:wrap;margin-bottom:3rem;">
                <a href="#apply" class="btn-orange">Apply Now — It's Free</a>
                <a href="#vehicles" class="btn-navy">See Vehicles</a>
            </div>

            <!-- Stats -->
            <div class="hero-stats anim-fadeUp d4" style="display:flex;gap:2.5rem;padding-top:2rem;border-top:1px solid var(--border);flex-wrap:wrap;">
                <div>
                    <div style="font-family:'Outfit',sans-serif;font-size:1.75rem;font-weight:800;color:var(--navy);">Weekly</div>
                    <div style="font-size:0.75rem;color:var(--text-3);letter-spacing:0.1em;text-transform:uppercase;margin-top:0.15rem;">Flexible Rates</div>
                </div>
                <div>
                    <div style="font-family:'Outfit',sans-serif;font-size:1.75rem;font-weight:800;color:var(--navy);">Fast</div>
                    <div style="font-size:0.75rem;color:var(--text-3);letter-spacing:0.1em;text-transform:uppercase;margin-top:0.15rem;">Approval Process</div>
                </div>
                <div>
                    <div style="font-family:'Outfit',sans-serif;font-size:1.75rem;font-weight:800;color:var(--navy);">$0</div>
                    <div style="font-size:0.75rem;color:var(--text-3);letter-spacing:0.1em;text-transform:uppercase;margin-top:0.15rem;">Hidden Fees</div>
                </div>
            </div>
        </div>

        <!-- Right — Comparison Chart -->
        <div class="hero-right anim-slideR d2" style="display:flex;align-items:center;">
            <div class="comparison-scroll" style="width:100%;">
            <div class="comparison-table" style="background:#fff;border:1px solid var(--border);border-radius:20px;box-shadow:0 24px 64px rgba(27,60,110,0.12);width:100%;overflow:hidden;">

                <!-- Chart header -->
                <div style="display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:2px solid var(--border);">
                    <div style="padding:1.2rem 1.25rem;background:var(--surface);">
                        <div style="font-family:'Outfit',sans-serif;font-size:0.7rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-3);">Feature</div>
                    </div>
                    <div style="padding:1.2rem 1.25rem;background:var(--surface);border-left:1px solid var(--border);text-align:center;">
                        <div style="font-family:'Outfit',sans-serif;font-size:0.75rem;font-weight:700;color:var(--text-2);letter-spacing:0.04em;">Big Rental Co.</div>
                        <div style="font-size:0.68rem;color:var(--text-3);margin-top:0.1rem;">Enterprise, Hertz, etc.</div>
                    </div>
                    <div style="padding:1.2rem 1.25rem;background:var(--navy);border-left:1px solid rgba(255,255,255,0.1);text-align:center;">
                        <div style="font-family:'Outfit',sans-serif;font-size:0.75rem;font-weight:800;color:#fff;letter-spacing:0.04em;">Flow Group WC</div>
                        <div style="font-size:0.68rem;color:rgba(255,255,255,0.5);margin-top:0.1rem;">Private &amp; personal</div>
                    </div>
                </div>

                <!-- Row 1 -->
                <div style="display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--border);">
                    <div style="padding:1rem 1.25rem;display:flex;align-items:center;">
                        <span style="font-size:0.85rem;font-weight:600;color:var(--navy);font-family:'Outfit',sans-serif;">Rideshare Eligible</span>
                    </div>
                    <div style="padding:1rem 1.25rem;border-left:1px solid var(--border);display:flex;align-items:center;justify-content:center;">
                        <span style="font-size:1.1rem;color:#E53E3E;">✕</span>
                    </div>
                    <div style="padding:1rem 1.25rem;background:rgba(27,60,110,0.04);border-left:1px solid var(--border);display:flex;align-items:center;justify-content:center;">
                        <span style="font-size:1.1rem;color:#2DAE68;">✓</span>
                    </div>
